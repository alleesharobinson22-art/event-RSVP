<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSVP for My Event</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>You're Invited!</h1>
        <p>Please let us know if you can make it.</p>
        
        <form id="rsvp-form" action="https://script.google.com/macros/s/AKfycbxNJWZJHq9deH64CsfDPUSdXV3qw-6g5Dr_-r9haScuIO5NasTtxhlPMd6UgAE-Hr3N5A/exec" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="attendance">Will you attend?</label>
            <select id="attendance" name="attendance">
                <option value="yes">Yes, I'll be there!</option>
                <option value="no">Sadly, I can't make it.</option>
            </select>

            <button type="submit" id="submit-btn">Send RSVP</button>
        </form>

        <script>
          const form = document.getElementById('rsvp-form');
          const button = document.getElementById('submit-btn');

          form.addEventListener("submit", function() {
            // This provides visual feedback to the user immediately
            button.innerHTML = "Sending...";
            button.style.opacity = "0.7";
            button.disabled = true;
            
            // The form will now naturally redirect to Google's success page
            // This bypasses the "Oops! Something went wrong" security error.
          });
        </script>
    </div>
</body>
</html>
